<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SignalMint AI</title>
    <style>
      :root {
        --bg: #000000;
        --panel: #111214;
        --panel-soft: #16181c;
        --line: #2f3336;
        --text: #e7e9ea;
        --muted: #71767b;
        --accent: #1d9bf0;
        --accent-soft: rgba(29, 155, 240, 0.12);
        --trend: #00ba7c;
        --risk: #f4212e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font: 15px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .app {
        max-width: 1100px;
        margin: 0 auto;
        padding: 0 16px 40px;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 5;
        backdrop-filter: blur(12px);
        background: rgba(0, 0, 0, 0.82);
        border-bottom: 1px solid var(--line);
      }

      .topbar-inner {
        max-width: 1100px;
        margin: 0 auto;
        padding: 14px 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
      }

      .brand {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .brand strong {
        font-size: 20px;
        font-weight: 800;
      }

      .brand span {
        color: var(--muted);
        font-size: 13px;
      }

      .top-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .button,
      .input {
        border-radius: 999px;
        font: inherit;
      }

      .button {
        border: 1px solid var(--line);
        background: transparent;
        color: var(--text);
        padding: 10px 16px;
        cursor: pointer;
      }

      .button.primary {
        background: var(--text);
        color: #000;
        border-color: var(--text);
        font-weight: 700;
      }

      .button.blue {
        background: var(--accent);
        border-color: var(--accent);
        color: white;
        font-weight: 700;
      }

      .button:disabled {
        opacity: 0.6;
        cursor: wait;
      }

      .input {
        border: 1px solid var(--line);
        background: var(--bg);
        color: var(--text);
        padding: 10px 14px;
        min-width: 240px;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1.5fr) minmax(280px, 0.9fr);
        gap: 24px;
        margin-top: 16px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 20px;
        overflow: hidden;
      }

      .panel-head {
        padding: 18px 18px 14px;
        border-bottom: 1px solid var(--line);
      }

      .panel-title {
        font-size: 20px;
        font-weight: 800;
      }

      .panel-sub {
        margin-top: 4px;
        color: var(--muted);
        font-size: 14px;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .stat {
        padding: 16px 18px;
        border-right: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
      }

      .stat:nth-child(2n) {
        border-right: 0;
      }

      .stat-label {
        color: var(--muted);
        font-size: 13px;
      }

      .stat-value {
        margin-top: 6px;
        font-size: 26px;
        font-weight: 800;
      }

      .notice {
        margin: 16px 18px 0;
        padding: 12px 14px;
        border: 1px solid var(--line);
        border-radius: 14px;
        color: var(--muted);
        background: var(--panel-soft);
      }

      .notice.success {
        color: var(--trend);
      }

      .notice.error {
        color: #ff6b72;
      }

      .toolbar {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        padding: 16px 18px;
        border-bottom: 1px solid var(--line);
      }

      .toggle {
        border: 1px solid var(--line);
        background: transparent;
        color: var(--muted);
        border-radius: 999px;
        padding: 8px 12px;
        font: inherit;
        cursor: pointer;
      }

      .toggle.active {
        color: var(--text);
        border-color: var(--text);
        background: rgba(231, 233, 234, 0.08);
      }

      .feed-item {
        padding: 16px 18px;
        border-top: 1px solid var(--line);
      }

      .feed-item:first-child {
        border-top: 0;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 10px;
        border-radius: 999px;
        background: var(--panel-soft);
        color: var(--muted);
        font-size: 12px;
      }

      .chip.trend {
        color: var(--trend);
        background: rgba(0, 186, 124, 0.12);
      }

      .chip.risk {
        color: var(--risk);
        background: rgba(244, 33, 46, 0.1);
      }

      .tweet {
        margin-top: 10px;
        white-space: pre-wrap;
        font-size: 15px;
      }

      .meta {
        margin-top: 10px;
        color: var(--muted);
        font-size: 13px;
      }

      .right-stack {
        display: grid;
        gap: 16px;
      }

      .mini-list .feed-item {
        padding: 14px 16px;
      }

      .mini-title {
        font-weight: 700;
        font-size: 15px;
      }

      .footer {
        padding: 16px 18px;
        color: var(--muted);
        font-size: 13px;
        border-top: 1px solid var(--line);
      }

      @media (max-width: 920px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .topbar-inner {
          align-items: flex-start;
          flex-direction: column;
        }

        .top-actions {
          width: 100%;
          justify-content: flex-start;
        }

        .stats {
          grid-template-columns: 1fr 1fr;
        }
      }

      @media (max-width: 640px) {
        .stats {
          grid-template-columns: 1fr;
        }

        .stat {
          border-right: 0;
        }

        .input {
          min-width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <strong id="brand">Loading…</strong>
          <span id="niche">Connecting to dashboard…</span>
        </div>
        <div class="top-actions">
          <button class="button" id="refresh">Refresh</button>
          <button class="button blue" id="runCycle">Run cycle</button>
          <a class="button" href="/api/queue" target="_blank" rel="noreferrer">Queue JSON</a>
        </div>
      </div>
    </header>

    <main class="app">
      <section class="layout">
        <section class="panel">
          <div class="panel-head">
            <div class="panel-title">Control center</div>
            <div class="panel-sub" id="audience"></div>
          </div>

          <div class="stats" id="stats"></div>

          <div class="toolbar">
            <button class="toggle active" data-filter="all">All</button>
            <button class="toggle" data-filter="trend">Trend</button>
            <button class="toggle" data-filter="evergreen">Evergreen</button>
            <input class="input" id="secret" type="password" placeholder="CRON_SECRET for manual run" />
            <button class="button" id="saveSecret">Save secret</button>
          </div>

          <div class="notice" id="actionStatus">Ready. Refresh to pull the latest queue and trend state.</div>

          <div id="queue"></div>

          <div class="footer" id="updatedAt"></div>
        </section>

        <aside class="right-stack">
          <section class="panel mini-list">
            <div class="panel-head">
              <div class="panel-title">Top trends</div>
              <div class="panel-sub" id="goal"></div>
            </div>
            <div id="trends"></div>
          </section>

          <section class="panel mini-list">
            <div class="panel-head">
              <div class="panel-title">Recently posted</div>
              <div class="panel-sub" id="runtimeDetails"></div>
            </div>
            <div id="recent"></div>
          </section>
        </aside>
      </section>
    </main>

    <script>
      let dashboardState = null;
      let currentFilter = "all";
      const isFileMode = window.location.protocol === "file:";

      const localPreviewState = {
        updatedAt: new Date().toISOString(),
        brand: {
          name: "SignalMint AI",
          handle: "@signalmintai",
          niche: "turning creator knowledge into tiny digital products and affiliate revenue",
          audience: "solo creators building products from attention",
          disclosure: "Local preview mode. API routes are unavailable on file:// URLs.",
          growthGoal: "preview the frontend locally, then deploy for live queue and trend data"
        },
        runtime: {
          dryRun: true,
          queueTarget: 14,
          postsPerRun: 1,
          trendPostsPerRun: 1,
          trendAutoPost: false
        },
        summary: {
          queued: 2,
          posted: 1,
          trends: 2,
          performanceRecords: 0,
          queuedTrend: 1,
          queuedEvergreen: 1
        },
        nextUp: [
          {
            source: "trend",
            experimentTag: "trend-proof-technology",
            visibilityRisk: 12,
            predictedScore: 38,
            topicCluster: "technology",
            text: "Big story today: Apple upgrades Genmoji with automatic suggestions.\n\nTake: specific product changes spread because they are instantly legible.",
            trendRef: {
              source: "Google News Technology US"
            }
          },
          {
            source: "evergreen",
            experimentTag: "opinion-contrarian-offer",
            visibilityRisk: 8,
            predictedScore: 27,
            topicCluster: "offer design",
            text: "Unpopular opinion: small accounts do not need more ideas. They need one offer the audience can repeat back in a sentence."
          }
        ],
        recentPosted: [
          {
            source: "evergreen",
            text: "Simple growth framework: Hook -> pain -> proof -> CTA.",
            postedAt: new Date(Date.now() - 1000 * 60 * 50).toISOString()
          }
        ],
        topTrends: [
          {
            headline: "Apple upgrades Genmoji with automatic suggestions",
            source: "Google News Technology US",
            category: "technology",
            trendScore: 86,
            url: "#"
          },
          {
            headline: "Bond yield spike worries equities market",
            source: "Google News Business US",
            category: "business",
            trendScore: 81,
            url: "#"
          }
        ]
      };

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function setActionStatus(message, mode = "neutral") {
        const node = document.getElementById("actionStatus");
        node.className = `notice${mode === "neutral" ? "" : ` ${mode}`}`;
        node.textContent = message;
      }

      async function readJsonResponse(response) {
        const raw = await response.text();

        try {
          return JSON.parse(raw);
        } catch {
          const trimmed = raw.trim();
          throw new Error(trimmed || `Request failed with status ${response.status}`);
        }
      }

      function applyRuntimeGuards() {
        if (!isFileMode) {
          return;
        }

        document.getElementById("runCycle").disabled = true;
        document.getElementById("saveSecret").disabled = true;
        document.getElementById("secret").disabled = true;
      }

      function renderQueue(items) {
        const visible = items.filter((item) => currentFilter === "all" || item.source === currentFilter);
        document.getElementById("queue").innerHTML =
          visible
            .map(
              (item) => `
          <article class="feed-item">
            <div class="chips">
              <span class="chip ${item.source === "trend" ? "trend" : ""}">${escapeHtml(item.source || "legacy")}</span>
              <span class="chip">${escapeHtml(item.experimentTag || item.pillar || "queue")}</span>
              ${item.visibilityRisk != null ? `<span class="chip risk">risk ${escapeHtml(item.visibilityRisk)}</span>` : ""}
            </div>
            <div class="tweet">${escapeHtml(item.text || "")}</div>
            <div class="meta">
              score ${escapeHtml(item.predictedScore ?? "n/a")}
              ${item.topicCluster ? ` · ${escapeHtml(item.topicCluster)}` : ""}
              ${item.trendRef?.source ? ` · ${escapeHtml(item.trendRef.source)}` : ""}
            </div>
          </article>
        `
            )
            .join("") || '<div class="feed-item"><div class="meta">No posts in this filter.</div></div>';
      }

      function renderTrends(items) {
        document.getElementById("trends").innerHTML =
          items
            .map(
              (story) => `
          <article class="feed-item">
            <a href="${escapeHtml(story.url)}" target="_blank" rel="noreferrer">
              <div class="mini-title">${escapeHtml(story.headline)}</div>
            </a>
            <div class="meta">
              ${escapeHtml(story.source)} · ${escapeHtml(story.category)} · ${escapeHtml(story.trendScore)}
            </div>
          </article>
        `
            )
            .join("") || '<div class="feed-item"><div class="meta">No live trends available.</div></div>';
      }

      function renderPosted(items) {
        document.getElementById("recent").innerHTML =
          items
            .map(
              (item) => `
          <article class="feed-item">
            <div class="chips">
              <span class="chip ${item.source === "trend" ? "trend" : ""}">${escapeHtml(item.source || "legacy")}</span>
            </div>
            <div class="tweet">${escapeHtml(item.text || "")}</div>
            <div class="meta">${item.postedAt ? new Date(item.postedAt).toLocaleString() : "posted earlier"}</div>
          </article>
        `
            )
            .join("") || '<div class="feed-item"><div class="meta">No posted history yet.</div></div>';
      }

      function bindFilters() {
        document.querySelectorAll("[data-filter]").forEach((button) => {
          button.addEventListener("click", () => {
            currentFilter = button.dataset.filter;
            document.querySelectorAll("[data-filter]").forEach((node) => node.classList.remove("active"));
            button.classList.add("active");
            if (dashboardState) {
              renderQueue(dashboardState.nextUp);
            }
          });
        });
      }

      async function load() {
        let data;

        if (isFileMode) {
          data = localPreviewState;
          setActionStatus("Local preview mode: open the deployed Vercel URL to use live API data and manual controls.", "success");
        } else {
          const res = await fetch("/api/status", { cache: "no-store" });
          data = await readJsonResponse(res);
          if (!res.ok || data.ok === false) {
            throw new Error(data.error || "Failed to load dashboard status");
          }
        }

        dashboardState = data;

        document.getElementById("brand").textContent = `${data.brand.name} ${data.brand.handle}`;
        document.getElementById("niche").textContent = data.brand.niche;
        document.getElementById("audience").textContent = `${data.brand.audience} · ${data.brand.disclosure}`;
        document.getElementById("goal").textContent = data.brand.growthGoal;
        document.getElementById("runtimeDetails").textContent =
          `dry run ${data.runtime.dryRun ? "on" : "off"} · posts ${data.runtime.postsPerRun} · trend auto ${data.runtime.trendAutoPost ? "on" : "off"}`;
        document.getElementById("updatedAt").textContent =
          `Last synced ${new Date(data.updatedAt).toLocaleString()} · queue target ${data.runtime.queueTarget}`;

        const stats = [
          ["Queued", data.summary.queued],
          ["Posted", data.summary.posted],
          ["Trends", data.summary.trends],
          ["Dry run", data.runtime.dryRun ? "Yes" : "No"],
          ["Trend queued", data.summary.queuedTrend],
          ["Evergreen", data.summary.queuedEvergreen]
        ];

        document.getElementById("stats").innerHTML = stats
          .map(
            ([label, value]) => `
          <div class="stat">
            <div class="stat-label">${label}</div>
            <div class="stat-value">${value}</div>
          </div>
        `
          )
          .join("");

        renderQueue(data.nextUp);
        renderTrends(data.topTrends);
        renderPosted(data.recentPosted);
      }

      async function runCycleNow() {
        if (isFileMode) {
          setActionStatus("Run cycle is unavailable in file preview mode. Use the deployed app or a local server.", "error");
          return;
        }

        const button = document.getElementById("runCycle");
        const secret = document.getElementById("secret").value.trim();
        button.disabled = true;
        setActionStatus("Running cycle…");

        try {
          const url = secret ? `/api/run-cycle?secret=${encodeURIComponent(secret)}` : "/api/run-cycle";
          const res = await fetch(url, {
            method: "GET",
            headers: secret ? { Authorization: `Bearer ${secret}` } : {}
          });
          const body = await readJsonResponse(res);

          if (!res.ok || !body.ok) {
            throw new Error(body.error || "Run cycle failed");
          }

          setActionStatus("Cycle complete. Refreshing state…", "success");
          await load();
        } catch (error) {
          setActionStatus(error.message || "Run cycle failed.", "error");
        } finally {
          button.disabled = false;
        }
      }

      function loadSavedSecret() {
        const saved = localStorage.getItem("x-autopilot-secret");
        if (saved) {
          document.getElementById("secret").value = saved;
        }
      }

      document.getElementById("saveSecret").addEventListener("click", () => {
        if (isFileMode) {
          setActionStatus("Secret storage is disabled in file preview mode.", "error");
          return;
        }

        localStorage.setItem("x-autopilot-secret", document.getElementById("secret").value.trim());
        setActionStatus("Secret saved in this browser.", "success");
      });

      document.getElementById("refresh").addEventListener("click", load);
      document.getElementById("runCycle").addEventListener("click", runCycleNow);
      bindFilters();
      applyRuntimeGuards();
      loadSavedSecret();
      load().catch((error) => {
        document.getElementById("niche").textContent = error.message;
        setActionStatus(error.message, "error");
      });
    </script>
  </body>
</html>

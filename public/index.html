<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SignalMint AI</title>
    <style>
      :root {
        --bg: #000;
        --panel: #16181c;
        --line: #2f3336;
        --text: #e7e9ea;
        --muted: #71767b;
        --blue: #1d9bf0;
        --green: #00ba7c;
        --red: #f4212e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font: 15px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .shell {
        max-width: 980px;
        margin: 0 auto;
        padding: 0 16px 32px;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 10;
        background: rgba(0, 0, 0, 0.88);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--line);
      }

      .topbar-inner {
        max-width: 980px;
        margin: 0 auto;
        padding: 14px 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }

      .brand {
        display: flex;
        flex-direction: column;
      }

      .brand strong {
        font-size: 20px;
        font-weight: 800;
      }

      .brand span {
        color: var(--muted);
        font-size: 13px;
      }

      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .button {
        border: 1px solid var(--line);
        border-radius: 999px;
        background: transparent;
        color: var(--text);
        padding: 10px 16px;
        font: inherit;
        cursor: pointer;
      }

      .button.primary {
        background: var(--blue);
        border-color: var(--blue);
        color: white;
        font-weight: 700;
      }

      .button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .button.small {
        padding: 7px 12px;
        font-size: 13px;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1.45fr) minmax(280px, 0.85fr);
        gap: 18px;
        margin-top: 16px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 18px;
        overflow: hidden;
      }

      .panel-head {
        padding: 16px;
        border-bottom: 1px solid var(--line);
      }

      .title {
        font-size: 20px;
        font-weight: 800;
      }

      .sub {
        margin-top: 4px;
        color: var(--muted);
        font-size: 14px;
      }

      .notice {
        margin: 16px;
        padding: 12px 14px;
        border: 1px solid var(--line);
        border-radius: 14px;
        color: var(--muted);
      }

      .notice.success {
        color: var(--green);
      }

      .notice.error {
        color: #ff6b72;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        border-bottom: 1px solid var(--line);
      }

      .stat {
        padding: 14px 16px;
        border-right: 1px solid var(--line);
      }

      .stat:last-child {
        border-right: 0;
      }

      .stat-label {
        color: var(--muted);
        font-size: 12px;
      }

      .stat-value {
        margin-top: 6px;
        font-size: 24px;
        font-weight: 800;
      }

      .toolbar {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
      }

      .toggle {
        border: 1px solid var(--line);
        border-radius: 999px;
        background: transparent;
        color: var(--muted);
        padding: 8px 12px;
        font: inherit;
        cursor: pointer;
      }

      .toggle.active {
        color: var(--text);
        border-color: var(--text);
      }

      .item {
        padding: 16px;
        border-top: 1px solid var(--line);
      }

      .item:first-child {
        border-top: 0;
      }

      .chips {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .item-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 12px;
      }

      .chip {
        border-radius: 999px;
        padding: 4px 10px;
        background: rgba(255, 255, 255, 0.06);
        color: var(--muted);
        font-size: 12px;
      }

      .chip.trend {
        color: var(--green);
      }

      .chip.risk {
        color: var(--red);
      }

      .tweet {
        margin-top: 10px;
        white-space: pre-wrap;
      }

      .meta {
        margin-top: 10px;
        color: var(--muted);
        font-size: 13px;
      }

      .right-stack {
        display: grid;
        gap: 18px;
      }

      .footer {
        padding: 14px 16px;
        border-top: 1px solid var(--line);
        color: var(--muted);
        font-size: 13px;
      }

      @media (max-width: 900px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .topbar-inner {
          flex-direction: column;
          align-items: flex-start;
        }

        .stats {
          grid-template-columns: 1fr;
        }

        .stat {
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .stat:last-child {
          border-bottom: 0;
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <strong id="brand">SignalMint AI @signalmintai</strong>
          <span id="niche">turning creator knowledge into tiny digital products and affiliate revenue</span>
        </div>
        <div class="actions">
          <button class="button" id="refresh">Refresh</button>
          <button class="button" id="generatePosts">Generate posts</button>
          <button class="button primary" id="runCycle">Run cycle</button>
        </div>
      </div>
    </header>

    <main class="shell">
      <section class="layout">
        <section class="panel">
          <div class="panel-head">
            <div class="title">Queue</div>
            <div class="sub" id="subtitle">Preview mode until live API data is available.</div>
          </div>

          <div class="stats" id="stats"></div>

          <div class="toolbar">
            <button class="toggle active" data-filter="all">All</button>
            <button class="toggle" data-filter="trend">Trend</button>
            <button class="toggle" data-filter="evergreen">Evergreen</button>
          </div>

          <div class="notice success" id="notice">Loading dashboard…</div>

          <div id="queue"></div>

          <div class="footer" id="footer">Waiting for state…</div>
        </section>

        <aside class="right-stack">
          <section class="panel">
            <div class="panel-head">
              <div class="title">Top trends</div>
              <div class="sub">Daily stories the bot can react to</div>
            </div>
            <div id="trends"></div>
          </section>

          <section class="panel">
            <div class="panel-head">
              <div class="title">Recently posted</div>
              <div class="sub" id="runtime">dry run on</div>
            </div>
            <div id="recent"></div>
          </section>
        </aside>
      </section>
    </main>

    <script>
      const fallbackState = {
        ok: true,
        updatedAt: new Date().toISOString(),
        brand: {
          name: "SignalMint AI",
          handle: "@signalmintai",
          niche: "turning creator knowledge into tiny digital products and affiliate revenue",
          audience: "solo creators building products from attention",
          disclosure: "Preview mode",
          growthGoal: "show a stable frontend first, then hydrate with live API data when available"
        },
        runtime: {
          dryRun: true,
          queueTarget: 14,
          postsPerRun: 1,
          trendPostsPerRun: 1,
          trendAutoPost: false
        },
        summary: {
          queued: 2,
          posted: 1,
          trends: 2,
          queuedTrend: 1,
          queuedEvergreen: 1
        },
        nextUp: [
          {
            source: "trend",
            experimentTag: "trend-proof-technology",
            draftType: "fast-take",
            visibilityRisk: 12,
            predictedScore: 38,
            topicCluster: "technology",
            text: "Big story today: Apple upgrades Genmoji with automatic suggestions.\n\nTake: specific product changes spread because they are instantly legible.",
            trendRef: { source: "Google News Technology US" }
          },
          {
            source: "evergreen",
            experimentTag: "opinion-contrarian-offer",
            draftType: "contrarian-angle",
            visibilityRisk: 8,
            predictedScore: 27,
            topicCluster: "offer design",
            text: "Unpopular opinion: small accounts do not need more ideas. They need one offer the audience can repeat back in a sentence."
          }
        ],
        recentPosted: [
          {
            source: "evergreen",
            text: "Simple growth framework: Hook -> pain -> proof -> CTA.",
            postedAt: new Date(Date.now() - 60 * 60 * 1000).toISOString()
          }
        ],
        topTrends: [
          {
            headline: "Apple upgrades Genmoji with automatic suggestions",
            source: "Google News Technology US",
            category: "technology",
            trendScore: 86,
            url: "#"
          },
          {
            headline: "Bond yield spike worries equities market",
            source: "Google News Business US",
            category: "business",
            trendScore: 81,
            url: "#"
          }
        ]
      };

      let currentFilter = "all";
      let previewMode = true;
      let dashboardState = fallbackState;

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function setNotice(message, mode = "success") {
        const node = document.getElementById("notice");
        node.className = `notice ${mode}`;
        node.textContent = message;
      }

      function renderStats(summary, runtime) {
        const stats = [
          ["Queued", summary.queued],
          ["Posted", summary.posted],
          ["Trends", summary.trends]
        ];

        document.getElementById("stats").innerHTML = stats.map(([label, value]) => `
          <div class="stat">
            <div class="stat-label">${label}</div>
            <div class="stat-value">${escapeHtml(value)}</div>
          </div>
        `).join("");

        document.getElementById("runtime").textContent =
          `dry run ${runtime.dryRun ? "on" : "off"} · trend auto ${runtime.trendAutoPost ? "on" : "off"}`;
      }

      function copyText(text) {
        navigator.clipboard.writeText(text).then(() => {
          setNotice("Post copied to clipboard.", "success");
        }).catch(() => {
          setNotice("Could not copy automatically. Select and copy the text manually.", "error");
        });
      }

      function renderQueue(items) {
        const visible = items.filter((item) => currentFilter === "all" || item.source === currentFilter);
        document.getElementById("queue").innerHTML = visible.map((item) => `
          <article class="item">
            <div class="chips">
              <span class="chip ${item.source === "trend" ? "trend" : ""}">${escapeHtml(item.source || "evergreen")}</span>
              <span class="chip">${escapeHtml(item.draftType || item.experimentTag || "queue")}</span>
              <span class="chip risk">risk ${escapeHtml(item.visibilityRisk ?? 0)}</span>
            </div>
            <div class="tweet">${escapeHtml(item.text)}</div>
            <div class="meta">
              score ${escapeHtml(item.predictedScore ?? 0)}
              ${item.topicCluster ? ` · ${escapeHtml(item.topicCluster)}` : ""}
              ${item.trendRef?.source ? ` · ${escapeHtml(item.trendRef.source)}` : ""}
            </div>
            <div class="item-actions">
              <button class="button small copy-button" data-copy="${escapeHtml(item.text)}">Copy post</button>
            </div>
          </article>
        `).join("") || '<article class="item"><div class="meta">No posts in this filter.</div></article>';

        document.querySelectorAll(".copy-button").forEach((button) => {
          button.addEventListener("click", () => copyText(button.dataset.copy || ""));
        });
      }

      function renderTrends(items) {
        document.getElementById("trends").innerHTML = items.map((story) => `
          <article class="item">
            <a href="${escapeHtml(story.url || "#")}" target="_blank" rel="noreferrer">
              <div>${escapeHtml(story.headline)}</div>
            </a>
            <div class="meta">${escapeHtml(story.source)} · ${escapeHtml(story.category)} · ${escapeHtml(story.trendScore)}</div>
          </article>
        `).join("") || '<article class="item"><div class="meta">No trends available.</div></article>';
      }

      function renderRecent(items) {
        document.getElementById("recent").innerHTML = items.map((item) => `
          <article class="item">
            <div class="chips">
              <span class="chip ${item.source === "trend" ? "trend" : ""}">${escapeHtml(item.source || "evergreen")}</span>
            </div>
            <div class="tweet">${escapeHtml(item.text || "")}</div>
            <div class="meta">${item.postedAt ? new Date(item.postedAt).toLocaleString() : "posted earlier"}</div>
          </article>
        `).join("") || '<article class="item"><div class="meta">No posted history yet.</div></article>';
      }

      function render(state) {
        dashboardState = state;
        document.getElementById("brand").textContent = `${state.brand.name} ${state.brand.handle}`;
        document.getElementById("niche").textContent = state.brand.niche;
        document.getElementById("subtitle").textContent = `${state.brand.audience} · ${state.brand.disclosure}`;
        document.getElementById("footer").textContent =
          `Last synced ${new Date(state.updatedAt).toLocaleString()} · queue target ${state.runtime.queueTarget}`;
        renderStats(state.summary, state.runtime);
        renderQueue(state.nextUp || []);
        renderTrends(state.topTrends || []);
        renderRecent(state.recentPosted || []);
      }

      async function safeJson(url, options) {
        const response = await fetch(url, options);
        const text = await response.text();
        let data;

        try {
          data = JSON.parse(text);
        } catch {
          throw new Error(text.trim() || `Request failed with status ${response.status}`);
        }

        if (!response.ok || data.ok === false) {
          throw new Error(data.error || `Request failed with status ${response.status}`);
        }

        return data;
      }

      function updateModeUi() {
        document.getElementById("runCycle").disabled = previewMode;
      }

      async function loadLiveIfAvailable() {
        const hostLooksStaticPreview = window.location.protocol === "file:" || ["127.0.0.1", "localhost"].includes(window.location.hostname);

        if (window.location.protocol === "file:") {
          previewMode = true;
          render(fallbackState);
          setNotice("Local preview mode. This is expected on file:// URLs.", "success");
          updateModeUi();
          return;
        }

        try {
          const live = await safeJson("/api/status", { cache: "no-store" });
          previewMode = false;
          render(live);
          setNotice("Live API connected.", "success");
        } catch (error) {
          previewMode = true;
          render(fallbackState);
          if (hostLooksStaticPreview) {
            setNotice("Static preview detected without API routes. Showing built-in demo data.", "success");
          } else {
            setNotice(error.message || "Failed to load dashboard.", "error");
          }
        }

        updateModeUi();
      }

      async function runCycle() {
        if (previewMode) {
          setNotice("Run cycle is disabled in preview mode.", "error");
          return;
        }

        const button = document.getElementById("runCycle");
        button.disabled = true;
        setNotice("Running cycle…", "success");

        try {
          await safeJson("/api/run-cycle", { method: "GET" });
          await loadLiveIfAvailable();
          setNotice("Cycle complete.", "success");
        } catch (error) {
          setNotice(error.message || "Run cycle failed.", "error");
        } finally {
          button.disabled = false;
        }
      }

      async function generatePosts() {
        if (previewMode) {
          render(fallbackState);
          setNotice("Preview mode: showing sample post drafts. Deploy the app to generate live queue items.", "success");
          return;
        }

        const button = document.getElementById("generatePosts");
        button.disabled = true;
        setNotice("Generating post drafts…", "success");

        try {
          const payload = await safeJson("/api/breaking", { method: "GET" });
          const nextState = {
            ...dashboardState,
            nextUp: payload.drafts,
            summary: {
              ...dashboardState.summary,
              queued: payload.drafts.length,
              trends: payload.stories.length
            },
            updatedAt: new Date().toISOString()
          };
          render(nextState);
          setNotice(`Generated ${payload.generatedCount} breaking-news drafts.`, "success");
        } catch (error) {
          setNotice(error.message || "Generate failed.", "error");
        } finally {
          button.disabled = false;
        }
      }

      document.querySelectorAll("[data-filter]").forEach((button) => {
        button.addEventListener("click", () => {
          currentFilter = button.dataset.filter;
          document.querySelectorAll("[data-filter]").forEach((node) => node.classList.remove("active"));
          button.classList.add("active");
          renderQueue(dashboardState.nextUp || []);
        });
      });

      document.getElementById("refresh").addEventListener("click", loadLiveIfAvailable);
      document.getElementById("generatePosts").addEventListener("click", generatePosts);
      document.getElementById("runCycle").addEventListener("click", runCycle);

      render(fallbackState);
      updateModeUi();
      loadLiveIfAvailable();
    </script>
  </body>
</html>
